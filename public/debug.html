<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified MC - Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0f;
      color: #f4f4f5;
      height: 100vh;
      overflow: hidden;
    }
    .app-shell {
      display: flex;
      height: 100vh;
    }
    aside {
      width: 220px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }
    .logo {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #c9a84c, #a07830);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 11px; font-weight: 700; color: #c9a84c; letter-spacing: 1px; }
    .logo-role { font-size: 10px; color: #6b7280; text-transform: uppercase; }
    nav {
      flex: 1;
      padding: 12px 8px;
      overflow-y: auto;
    }
    .nav-label {
      font-size: 9px; color: #6b7280; letter-spacing: 2px;
      padding: 4px 10px 8px; text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      margin-bottom: 2px;
      border-radius: 8px;
      cursor: pointer;
      color: #9ca3af;
      font-size: 13px;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .nav-item.active {
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.3);
      color: #c9a84c;
    }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; }
    main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }
    h1 { font-size: 22px; color: #c9a84c; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 13px; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .card h3 { color: #c9a84c; font-size: 14px; margin-bottom: 8px; }
    .card p { color: #9ca3af; }
    .btn {
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.3);
      color: #c9a84c;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 12px;
    }
    .btn:hover { background: rgba(201,168,76,0.3); }
    #status { margin-top: 12px; font-size: 12px; color: #00ffd1; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside>
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <div class="logo-text">UNIFIED MC</div>
          <div class="logo-role">Emperor</div>
        </div>
      </div>
      <nav>
        <div class="nav-label">Navigation</div>
        <a href="#chat" class="nav-item active" onclick="navigate('chat')">
          <span class="nav-icon">💬</span> Chat
        </a>
        <a href="#tasks" class="nav-item" onclick="navigate('tasks')">
          <span class="nav-icon">✅</span> Tasks
        </a>
        <a href="#team" class="nav-item" onclick="navigate('team')">
          <span class="nav-icon">👥</span> Team
        </a>
        <a href="#memory" class="nav-item" onclick="navigate('memory')">
          <span class="nav-icon">🧠</span> Memory
        </a>
        <a href="#calendar" class="nav-item" onclick="navigate('calendar')">
          <span class="nav-icon">📅</span> Calendar
        </a>
      </nav>
    </aside>
    <main>
      <h1>⚡ Dynasty Command Center</h1>
      <p>Welcome back, Emperor. All systems nominal.</p>
      
      <div class="card">
        <h3>Test Interactivity</h3>
        <p>If you can click this button, the UI is working:</p>
        <button class="btn" onclick="testClick()">Click Me</button>
        <div id="status"></div>
      </div>
      
      <div class="card">
        <h3>Server Status</h3>
        <p id="server-status">Checking...</p>
      </div>
    </main>
  </div>
  
  <script>
    function navigate(page) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.nav-item').classList.add('active');
      document.getElementById('status').textContent = 'Navigated to: ' + page;
    }
    
    function testClick() {
      const status = document.getElementById('status');
      status.textContent = '✓ Click worked at ' + new Date().toLocaleTimeString();
    }
    
    // Test if we can reach the API
    fetch('/api/cron')
      .then(r => r.ok ? r.json() : Promise.reject('Not OK'))
      .then(data => {
        document.getElementById('server-status').innerHTML = 
          '<span style="color:#00ffd1">● API Online</span> - ' + JSON.stringify(data).slice(0, 100);
      })
      .catch(e => {
        document.getElementById('server-status').innerHTML = 
          '<span style="color:#ef4444">● API Offline</span> - ' + e.message;
      });
  </script>
</body>
</html>
